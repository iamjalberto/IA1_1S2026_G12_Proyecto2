<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block titulo %}HandTalk AI{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background-color: #0f1117;
        color: #e2e8f0;
        font-family: "Segoe UI", sans-serif;
      }
      .card {
        background: #1a1d27;
        border: 1px solid #2d3348;
        border-radius: 12px;
      }
      .badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 99px;
        font-size: 0.75rem;
        font-weight: 600;
      }
      .badge-green {
        background: #14532d;
        color: #4ade80;
      }
      .badge-red {
        background: #450a0a;
        color: #f87171;
      }
      .badge-yellow {
        background: #422006;
        color: #fbbf24;
      }
    </style>
  </head>
  <body class="min-h-screen">
    <!-- Navbar -->
    <nav
      style="background: #13161f; border-bottom: 1px solid #2d3348"
      class="px-6 py-3 flex items-center justify-between"
    >
      <div class="flex items-center gap-3">
        <span style="font-size: 1.5rem">🤟</span>
        <span class="font-bold text-lg" style="color: #60a5fa"
          >HandTalk AI</span
        >
      </div>
      <div class="flex gap-4 text-sm">
        <a
          href="/"
          class="hover:text-blue-400 {% if request.path == '/' %}text-blue-400 font-semibold{% else %}text-slate-400{% endif %}"
          >Inicio</a
        >
        <a
          href="/admin"
          class="hover:text-blue-400 {% if request.path.startswith('/admin') %}text-blue-400 font-semibold{% else %}text-slate-400{% endif %}"
          >Administracion</a
        >
      </div>
    </nav>

    <!-- Contenido -->
    <main class="max-w-7xl mx-auto px-4 py-6">
      {% block contenido %}{% endblock %}
    </main>

    <footer class="text-center text-slate-600 text-xs py-4 mt-8">
      HandTalk AI &mdash; Inteligencia Artificial 1 &mdash; USAC 2026 &mdash;
      201346084
    </footer>
  </body>
</html>
