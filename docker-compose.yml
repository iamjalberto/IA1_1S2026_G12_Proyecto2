services:
  # Backend: Flask + OpenCV + MediaPipe + scikit-learn
  backend:
    build: .
    container_name: handtalk_backend
    ports:
      - "5000:5000"
    # privileged da acceso a todos los dispositivos de video del host
    privileged: true
    volumes:
      # Montar en volumen para que el dataset, modelo y logs persistan fuera del contenedor
      - ./dataset:/app/dataset
      - ./modelo:/app/modelo
      - ./logs:/app/logs
      - ./config:/app/config
    environment:
      # Deshabilitar el hilo de camara del servidor en Docker.
      # En produccion/cloud el stream lo provee el navegador via getUserMedia.
      - DISABLE_CAMERA=true
    env_file:
      - .env
    restart: unless-stopped

  # Frontend: Vue 3 compilado y servido por Nginx
  frontend:
    build: ./frontend
    container_name: handtalk_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
