server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Archivos estaticos del build de Vite; fallback a index.html para Vue Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy al backend Flask para la API REST
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy al panel de administracion
    location /admin {
        proxy_pass http://backend:5000/admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Stream MJPEG: requiere deshabilitar buffering para que fluya en tiempo real
    location /video_feed {
        proxy_pass http://backend:5000/video_feed;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
        chunked_transfer_encoding on;
    }
}
